<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理票 · Tidoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Schibsted+Grotesk:opsz,wght@10..36,400..700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- 左侧轨道：品牌 + 主导航 -->
    <nav class="rail" aria-label="主导航">
      <div class="rail-brand" title="理票 · Tidoc">
        <span class="rail-mark">
          <svg viewBox="0 0 40 40" aria-hidden="true">
            <path d="M7 11h22M7 17h22M7 23h22" stroke="#fff" stroke-width="1.7" stroke-linecap="round" opacity=".95"/>
            <path d="M7 11h22a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2z" stroke="#fff" stroke-width="1.4" fill="none" opacity=".18"/>
            <path d="M30 9l2 2-2 2" stroke="#fff" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 24c4-3 8-7 12-7 3 0 5 2 7 5" stroke="#f5e7c4" stroke-width="1.3" fill="none" stroke-dasharray="2 2.5" stroke-linecap="round"/>
          </svg>
        </span>
      </div>
      <div class="rail-items">
        <button class="rail-item active" data-rail="all" title="全部条目">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="rail-label">全部</span>
        </button>
        <button class="rail-item" data-rail="draft" title="草稿条目">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M5 4h9l5 5v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M14 4v6h6" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          <span class="rail-label">草稿</span>
        </button>
        <button class="rail-item" data-rail="warn" title="需确认的条目">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 3 2 21h20L12 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M12 10v5M12 18.5v.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="rail-label">需确认</span>
        </button>
        <button class="rail-item" data-rail="modified" title="修改过的条目">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="m4 20 4-1 10-10-3-3L5 16l-1 4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="m14 6 3 3" stroke="currentColor" stroke-width="1.6"/></svg>
          <span class="rail-label">已改</span>
        </button>
      </div>
      <div class="rail-bottom">
        <button class="rail-item" id="railExport" title="导出选中或全部">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 4v11m0 0 4-4m-4 4-4-4M5 19h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="rail-label">导出</span>
        </button>
        <button class="rail-item" id="railImport" title="导入">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 15V4m0 0 4 4m-4-4-4 4M5 19h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="rail-label">导入</span>
        </button>
        <button class="rail-item" id="railPrint" title="打印">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M7 9V4h10v5M7 18H4v-6h16v6h-3m-10 2h10v-4H7v4z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          <span class="rail-label">打印</span>
        </button>
      </div>
    </nav>

    <!-- 主区 -->
    <div class="main">
      <header class="topbar">
        <div class="title-tabs" id="titleTabs" role="tablist">
          <button class="title-tab active" data-title="" role="tab">全部</button>
          <button class="title-tab univ" data-title="北京理工大学" role="tab">北京理工大学</button>
          <button class="title-tab found" data-title="北京理工大学教育基金会" role="tab">教育基金会</button>
        </div>

        <div class="profile-switch">
          <button class="profile-pill" id="profilePill" title="切换 / 管理身份">
            <span class="profile-avatar" id="profileAvatar">—</span>
            <span class="profile-meta">
              <span class="profile-name" id="profileName">未选择</span>
              <span class="profile-reviewer" id="profileReviewer"></span>
            </span>
            <svg class="chev" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="m6 9 6 6 6-6" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>
          </button>
        </div>

        <button id="batchImportBtn" class="btn" title="从文件夹批量导入">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M3 7h6l2 2h10v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M12 11v6m0-6-2.5 2.5M12 11l2.5 2.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>批量导入</span>
        </button>
        <button id="newEntryBtn" class="btn primary" title="新建报账条目（N）">
          <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>新建</span>
        </button>
      </header>

      <!-- 工具条：搜索 / 快速筛选 / 排序 / 高级 -->
      <div class="toolbar" id="toolbar">
        <div class="search">
          <svg class="search-ico" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input id="filterKeyword" type="search" placeholder="搜索发票号、销售方、备注、物资、明细" autocomplete="off"/>
          <kbd id="searchKbd">/</kbd>
        </div>

        <div class="quick-chips" id="quickChips">
          <label class="chip-select">
            <span class="chip-label">状态</span>
            <select id="filterStatus">
              <option value="">全部</option>
              <option value="draft">草稿</option>
              <option value="partial">部分材料</option>
              <option value="complete">完整</option>
            </select>
          </label>
          <label class="chip-select">
            <span class="chip-label">校验</span>
            <select id="filterCheck">
              <option value="">全部</option>
              <option value="pass">通过</option>
              <option value="warning">需确认</option>
              <option value="blocked">问题严重</option>
            </select>
          </label>
          <label class="chip-select">
            <span class="chip-label">报账人</span>
            <select id="filterProfile">
              <option value="">全部</option>
            </select>
          </label>
        </div>

        <div class="toolbar-spacer"></div>

        <button class="chip-toggle" id="advancedToggle" title="高级筛选">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>高级</span>
          <span class="dot hidden" id="advancedDot"></span>
        </button>

        <label class="chip-toggle" title="排序">
          <span class="chip-label">排序</span>
          <select id="sortSelect">
            <option value="updated">最近更新</option>
            <option value="created">创建时间</option>
            <option value="date">发票日期</option>
            <option value="amount">金额从高</option>
            <option value="seller">销售方</option>
          </select>
        </label>

        <div class="view-density" role="group" aria-label="视图密度">
          <button class="density-btn active" data-density="comfortable" title="宽松">宽</button>
          <button class="density-btn" data-density="compact" title="紧凑">紧</button>
        </div>
      </div>

      <!-- 高级筛选面板（可折叠） -->
      <div class="advanced-panel hidden" id="advancedPanel">
        <div class="adv-grid">
          <div class="adv-field">
            <label>发票日期</label>
            <div class="adv-range">
              <input id="filterDateFrom" type="date" placeholder="起"/>
              <span>—</span>
              <input id="filterDateTo" type="date" placeholder="止"/>
            </div>
          </div>
          <div class="adv-field">
            <label>金额区间 ¥</label>
            <div class="adv-range">
              <input id="filterAmountMin" type="number" placeholder="最小" step="0.01"/>
              <span>—</span>
              <input id="filterAmountMax" type="number" placeholder="最大" step="0.01"/>
            </div>
          </div>
          <div class="adv-field">
            <label>只显示</label>
            <span class="adv-hint">已修改的条目可从左侧「已改」进入</span>
          </div>
          <div class="adv-actions">
            <button class="btn small ghost" id="clearFilters">清空筛选</button>
          </div>
        </div>
      </div>

      <!-- 活跃筛选标签 -->
      <div class="active-filters hidden" id="activeFilters"></div>

      <!-- 条目区 -->
      <main class="content">
        <div class="content-head">
          <div class="stats" id="stats"></div>
          <div class="selection-bar hidden" id="selectionBar">
            <span id="selCount">已选 0</span>
            <button class="btn small" id="selectAllBtn">全选</button>
            <button class="btn small ghost" id="clearSelBtn">取消</button>
            <span class="bar-sep">|</span>
            <button class="btn small ghost" id="batchSummaryBtn">汇总</button>
            <button class="btn small danger" id="batchDeleteBtn">删除</button>
          </div>
        </div>

        <div id="entryList" class="entry-list" data-density="comfortable"></div>

        <div id="emptyState" class="empty-state hidden">
          <div class="empty-illus" id="emptyIllus"></div>
          <h2 class="empty-title" id="emptyTitle">还没有报账条目</h2>
          <p class="empty-sub" id="emptySub"></p>
          <button class="btn primary" id="emptyNew">新建第一条</button>
        </div>
      </main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
