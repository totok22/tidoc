<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tidoc</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app">
    <!-- 主区 -->
    <div class="main">
      <header class="topbar">
        <div class="app-title" id="appTitle" title="打开 GitHub 仓库" role="button" tabindex="0">
          <span class="app-mark">
            <img src="assets/tidoc-logo-128.png" alt="" />
          </span>
          <span class="app-title-text">
            <b>tidoc</b>
          </span>
        </div>
        <div class="topbar-actions">
          <button id="actionImport" class="btn ghost icon-text" title="导入别人导出的 .tidoc 绑定包">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M12 15V4m0 0 4 4m-4-4-4 4M5 19h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>导入包</span>
          </button>
          <button id="settingsBtn" class="btn ghost icon-only" title="设置">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.7" fill="none"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14.2 3h-4.4l-.3 2.7a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 2 1.2l.3 2.7h4.4l.3-2.7a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/></svg>
            <span class="update-notice-dot" aria-hidden="true"></span>
          </button>
          <span class="topbar-divider"></span>
          <button id="batchImportBtn" class="btn" title="从文件夹或多文件导入发票 PDF，可自动匹配 XML">
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M3 7h6l2 2h10v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M12 11v6m0-6-2.5 2.5M12 11l2.5 2.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>导入发票</span>
          </button>
          <button id="newEntryBtn" class="btn primary" title="新建报账条目（N）">
            <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <span>新建</span>
          </button>
        </div>
      </header>

      <!-- 工具条：搜索 / 快速筛选 / 排序 / 高级 -->
      <div class="toolbar" id="toolbar">
        <div class="search">
          <svg class="search-ico" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input id="filterKeyword" type="search" placeholder="搜索发票号、销售方、金额、备注、物资" autocomplete="off"/>
          <kbd id="searchKbd">/</kbd>
        </div>

        <div class="quick-chips" id="quickChips" aria-label="筛选">
          <label class="chip-select">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M4 20V8l8-4 8 4v12M8 20v-7h8v7M3 20h18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <span class="chip-label">抬头</span>
            <select id="filterTitle">
              <option value="">全部</option>
              <option value="北京理工大学">北京理工大学</option>
              <option value="北京理工大学教育基金会">教育基金会</option>
            </select>
          </label>
          <label class="chip-select">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><circle cx="12" cy="8" r="3" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M5 20c.7-4 3-6 7-6s6.3 2 7 6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
            <span class="chip-label">报账人</span>
            <select id="filterProfile">
              <option value="">全部</option>
            </select>
          </label>
          <label class="chip-select">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M4 5h9l7 7-8 8-8-8z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="9" cy="10" r="1.3" fill="currentColor"/></svg>
            <span class="chip-label">标签</span>
            <select id="filterTag">
              <option value="">全部</option>
            </select>
          </label>
          <div class="view-presets" id="viewPresets" role="group" aria-label="状态">
            <button class="preset-btn active" data-view="all">全部</button>
            <button class="preset-btn" data-view="incomplete">待补材料</button>
            <button class="preset-btn" data-view="warning">识别提醒</button>
            <button class="preset-btn" data-view="modified">已修改</button>
            <button class="preset-btn" data-view="complete">齐备</button>
          </div>
        </div>

        <div class="toolbar-spacer"></div>

        <button class="chip-toggle" id="advancedToggle">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span>高级</span>
          <span class="dot hidden" id="advancedDot"></span>
        </button>

        <label class="chip-select chip-toggle sort-chip">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M8 6h11M8 12h8M8 18h5M4 5v14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          <select id="sortSelect">
            <option value="updated">最近更新</option>
            <option value="created">创建时间</option>
            <option value="date">发票日期</option>
            <option value="amount">金额从高</option>
            <option value="seller">销售方</option>
          </select>
        </label>

      </div>

      <!-- 高级筛选面板（可折叠） -->
      <div class="advanced-panel hidden" id="advancedPanel">
        <div class="adv-grid">
          <div class="adv-field">
            <label>发票日期</label>
            <div class="adv-range">
              <input id="filterDateFrom" type="date" placeholder="起"/>
              <span>—</span>
              <input id="filterDateTo" type="date" placeholder="止"/>
            </div>
          </div>
          <div class="adv-field">
            <label>金额区间 ¥</label>
            <div class="adv-range">
              <input id="filterAmountMin" type="number" placeholder="最小" step="0.01"/>
              <span>—</span>
              <input id="filterAmountMax" type="number" placeholder="最大" step="0.01"/>
            </div>
          </div>
          <div class="adv-field">
            <label>校验</label>
            <select id="filterCheck">
              <option value="">全部</option>
              <option value="pass">通过</option>
              <option value="warning">识别提醒</option>
              <option value="blocked">严重问题</option>
            </select>
          </div>
          <div class="adv-field">
            <label>条目备注</label>
            <select id="filterNotes">
              <option value="">全部</option>
              <option value="yes">有备注</option>
              <option value="no">无备注</option>
            </select>
          </div>
          <div class="adv-actions">
            <button class="btn small ghost" id="clearFilters">清空筛选</button>
          </div>
        </div>
      </div>

      <!-- 活跃筛选标签 -->
      <div class="active-filters hidden" id="activeFilters"></div>

      <!-- 条目区 -->
      <main class="content">
        <div class="batch-folders" id="batchFolders"></div>
        <div class="batch-context hidden" id="batchContext"></div>
        <div class="content-head">
          <div class="content-summary">
            <div class="stats" id="stats"></div>
          </div>
          <div class="selection-bar empty" id="selectionBar" aria-label="批量操作">
            <span id="selCount">选择条目</span>
            <button class="selection-clear hidden" id="clearSelBtn" title="取消选择" aria-label="取消选择">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="m7 7 10 10M17 7 7 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <span class="selection-divider"></span>
            <button class="btn small ghost" id="addToBatchBtn" title="调整所选条目的批次归属">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M3 7h7l2 2h9v10H3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg><span>批次</span>
            </button>
            <button class="btn small ghost" id="tagBtn" title="添加或移除标签">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M4 5h9l7 7-8 8-8-8z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="9" cy="10" r="1.3" fill="currentColor"/></svg><span>标签</span>
            </button>
            <span class="selection-divider"></span>
            <button class="btn small ghost" id="batchSummaryBtn">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M5 6h14M5 12h9M5 18h12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg><span>汇总</span>
            </button>
            <button class="btn small ghost" id="batchExportBtn">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M12 4v11m0 0 4-4m-4 4-4-4M5 20h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg><span>导出</span>
            </button>
            <button class="btn small ghost" id="batchPrintBtn">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M7 9V4h10v5M7 17H5a2 2 0 0 1-2-2v-4h18v4a2 2 0 0 1-2 2h-2M7 14h10v6H7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg><span>打印</span>
            </button>
            <span class="selection-divider"></span>
            <button class="btn small danger selection-delete" id="batchDeleteBtn">
              <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M5 7h14M9 7V4h6v3m2 0-1 13H8L7 7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg><span>删除</span>
            </button>
          </div>
        </div>

        <div id="entryList" class="entry-list" data-density="comfortable" role="listbox" aria-label="报账条目" aria-multiselectable="true"></div>

        <div id="emptyState" class="empty-state hidden">
          <div class="empty-illus" id="emptyIllus"></div>
          <h2 class="empty-title" id="emptyTitle">还没有报账条目</h2>
          <p class="empty-sub" id="emptySub"></p>
          <button class="btn primary" id="emptyNew">新建第一条</button>
        </div>
      </main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root" aria-live="polite"></div>

  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
