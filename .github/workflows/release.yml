name: Release Tidoc

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, for manual release"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  build-windows:
    needs: test
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Normalize version
        shell: bash
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Stamp package version
        run: python scripts/set_version.py $env:VERSION

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build Windows core
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed
          --name tidoc
          --paths "."
          --collect-submodules tidoc
          --icon "tidoc/web/assets/tidoc-logo.icns"
          --add-data "tidoc/web;tidoc/web"
          scripts/tidoc_app_entry.py

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:VERSION" "/DSourceDir=$PWD\dist\tidoc" "/DOutputDir=$PWD\release" "packaging\windows\tidoc.iss"

      - name: Install print dependencies
        run: pip install -r requirements-print.txt

      - name: Build Windows print component
        run: >
          pyinstaller --noconfirm --clean --onefile
          --name tidoc_print
          --paths "."
          --collect-submodules tidoc_print
          --add-data "tidoc_print/templates;tidoc_print/templates"
          scripts/tidoc_print_entry.py

      - name: Smoke-test Windows print component
        run: .\dist\tidoc_print.exe --self-test

      - name: Collect Windows artifacts
        shell: bash
        run: |
          mkdir -p release
          cp dist/tidoc_print.exe "release/tidoc-print-windows-v${VERSION}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: tidoc-windows
          path: release/*

  build-macos:
    needs: test
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Normalize version
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Stamp package version
        run: python scripts/set_version.py "$VERSION"

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS core app
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed
          --name "tidoc"
          --paths "."
          --collect-submodules tidoc
          --icon "tidoc/web/assets/tidoc-logo.icns"
          --add-data "tidoc/web:tidoc/web"
          scripts/tidoc_app_entry.py

      - name: Create DMG
        run: |
          mkdir -p release
          rm -rf dmg-root
          mkdir -p dmg-root
          cp -R "dist/tidoc.app" "dmg-root/tidoc.app"
          ln -s /Applications "dmg-root/Applications"
          hdiutil create -volname "Tidoc" \
            -srcfolder "dmg-root" \
            -ov -format UDZO "release/tidoc-core-macos-v${VERSION}.dmg"

      - name: Install print dependencies
        run: pip install -r requirements-print.txt

      - name: Build macOS print component
        run: >
          pyinstaller --noconfirm --clean --onefile
          --name tidoc_print
          --paths "."
          --collect-submodules tidoc_print
          --add-data "tidoc_print/templates:tidoc_print/templates"
          scripts/tidoc_print_entry.py

      - name: Smoke-test macOS print component
        run: dist/tidoc_print --self-test

      - name: Zip macOS print component
        run: |
          cp dist/tidoc_print release/tidoc_print
          chmod +x release/tidoc_print
          (cd release && zip "tidoc-print-macos-v${VERSION}.zip" tidoc_print)
          rm release/tidoc_print

      - uses: actions/upload-artifact@v4
        with:
          name: tidoc-macos
          path: release/*

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      COS_BUCKET: bitfsae-1416420925
      COS_BUCKET_ALIAS: my-cos
      COS_REGION: ap-beijing
      COS_ENDPOINT: cos.accelerate.myqcloud.com
    steps:
      - uses: actions/checkout@v5

      - name: Normalize version
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          pattern: tidoc-*
          path: release
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate release notes
        run: >
          python scripts/release_notes.py
          --version "$VERSION"
          --output release/release_notes.md
          --json-output release/release_notes.json

      - name: Build manifest
        run: >
          python scripts/build_manifest.py
          --release-dir release
          --version "$VERSION"
          --base-url "https://img.bitfsae.com/tidoc"
          --notes-file release/release_notes.json

      - name: Install Tencent COSCLI
        run: |
          set -euo pipefail
          curl -L --fail \
            https://github.com/tencentyun/coscli/releases/download/v1.0.8/coscli-v1.0.8-linux-amd64 \
            -o ./coscli
          chmod +x ./coscli
          ./coscli --help > /dev/null

      - name: Configure Tencent COSCLI
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
        run: |
          set -euo pipefail
          cat > ~/.cos.yaml <<EOF
          cos:
            base:
              secretid: ${TENCENT_SECRET_ID}
              secretkey: ${TENCENT_SECRET_KEY}
              sessiontoken: ""
              protocol: https
            buckets:
              - name: ${COS_BUCKET}
                alias: ${COS_BUCKET_ALIAS}
                region: ${COS_REGION}
                endpoint: ${COS_ENDPOINT}
                ofs: false
          EOF

      - name: Upload release files
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r local_path cos_key; do
            [ -n "$local_path" ] || continue
            ./coscli cp "$local_path" "cos://${COS_BUCKET_ALIAS}/${cos_key}"
          done < release/upload_plan.tsv

      - name: Upload manifest last
        run: |
          set -euo pipefail
          ./coscli cp release/manifest.json "cos://${COS_BUCKET_ALIAS}/tidoc/manifest.json"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          notes="release/release_notes.md"
          assets=(
            "release/tidoc-core-macos-v${VERSION}.dmg"
            "release/tidoc-core-windows-v${VERSION}.exe"
            "release/tidoc-print-macos-v${VERSION}.zip"
            "release/tidoc-print-windows-v${VERSION}.exe"
            "release/manifest.json"
          )
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "Tidoc ${VERSION}" --notes-file "$notes"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --target "$GITHUB_SHA" --title "Tidoc ${VERSION}" --notes-file "$notes"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: tidoc-manifest
          path: |
            release/manifest.json
            release/upload_plan.tsv
